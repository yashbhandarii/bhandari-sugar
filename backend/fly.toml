# Fly.io configuration for Bhandari Sugar Backend
# App name will be set by `fly launch` — leave as placeholder
app = "bhandari-sugar-backend"
primary_region = "sin" # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false   # Keep always-on (free tier allows this)
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
